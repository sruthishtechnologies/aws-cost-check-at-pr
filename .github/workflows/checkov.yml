name: Checkov Scan

on:
  pull_request:

permissions:
  contents: read

jobs:
  checkov:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5

      - name: Run Checkov
        run: |
          checkov \
          -d . \
          --framework terraform \
          --output cli \
          > checkov-report.txt

      - name: Comment PR
        uses: actions/github-script@v7
          if: failure()
            with:
              github-token: ${{ secrets.GITHUB_TOKEN }}

              script: |
                const fs = require('fs');
                const report = fs.readFileSync('checkov-report.txt', 'utf8');

              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## Checkov Findings\n\`\`\`\n${report.slice(0,6000)}\n\`\`\``
             });
