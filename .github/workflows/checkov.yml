name: Checkov Scan

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  checkov:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Checkov
        id: checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Comment Checkov summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const outcome = '${{ steps.checkov.outcome }}';

            const body = outcome === 'failure'
              ? `## Checkov Security Scan

            ❌ Checkov found infrastructure security/compliance issues.

            Example issue:
            - CKV2_AWS_41: Ensure an IAM role is attached to EC2 instance
            - File: \`infra/main.tf\`
            - Resource: \`aws_instance.demo\`

            Please review the GitHub Actions logs and Security Code Scanning alerts.`
              : `## Checkov Security Scan

            ✅ No Checkov issues found.`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail PR if Checkov failed
        if: steps.checkov.outcome == 'failure'
        run: |
          echo "Checkov failed. Blocking PR."
          exit 1
